<!DOCTYPE html>
<html>

<head>
    <style>

.error{
    color:red;
    font-size:14px;
    margin-top:5px;
    display:block;
}

.error-input{

    border:2px solid red;

}

</style>

    <title>Add School</title>
</head>

<body>

    <h1>Add School</h1>

    <p>
        <a href="/dashboard/schools/">← Back to Schools</a>
    </p>

    <form method="POST" id="schoolForm" novalidate>

        {% csrf_token %}

        <p>
            <label>School Name</label><br>
            <input
                type="text"
                id="name"
                name="name"
                placeholder="Enter School Name"
                novalidate >

            <span id="nameError" class="error"></span>

        </p>

        <p>
            <label>Principal Name</label><br>
            <input
                type="text"
                id="principal"
                name="principal"
                placeholder="Enter Principal Name"
                novalidate >

            <span id="principalError" class="error"></span>

        </p>

        <p>
            <label>Address</label><br>

            <textarea
                name="address"
                id="address"
                rows="4"
                cols="40"
                placeholder="Enter School Address"
                novalidate
            ></textarea>

            <span id="addressError" class="error"></span>

        </p>

        <p>
    <label>Established Year</label><br>
    <input
        type="number"
        id="year"
        name="established_year"
        placeholder="Enter Established Year"
        novalidate
    >
    
    <span id="yearError" class="error"></span>

</p>

        <button type="submit">
            Save School
        </button>

    </form>

    <script>

const form=document.getElementById("schoolForm");

form.addEventListener("submit",function(e){

    let valid=true;

    document.querySelectorAll(".error").forEach(function(error){

        error.innerHTML="";

    });

    document.querySelectorAll("input,textarea").forEach(function(field){

        field.classList.remove("error-input");

    });

    const name = document.getElementById("name");

if(name.value.trim() === ""){

    document.getElementById("nameError").innerHTML =
        "School name is required.";

    name.classList.add("error-input");

    valid = false;

}

if(!valid){

    e.preventDefault();

}
});

const principal = document.getElementById("principal");

if(principal.value.trim() === ""){

    document.getElementById("principalError").innerHTML =
        "Principal name is required.";

    principal.classList.add("error-input");

    valid = false;

}

const address = document.getElementById("address");

if(address.value.trim() === ""){

    document.getElementById("addressError").innerHTML =
        "Address is required.";

    address.classList.add("error-input");

    valid = false;

}

const year = document.getElementById("year");

if(year.value.trim() === ""){

    document.getElementById("yearError").innerHTML =
        "Established year is required.";

    year.classList.add("error-input");

    valid = false;

}

else if(year.value < 1800 || year.value > new Date().getFullYear()){

    document.getElementById("yearError").innerHTML =
        "Please enter a valid year.";

    year.classList.add("error-input");

    valid = false;

}

</script>

</body>                                                                                                                                                                                                

</html>
