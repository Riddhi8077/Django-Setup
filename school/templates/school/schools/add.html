<!DOCTYPE html>
<html>

<head>
    <title>Add School</title>
</head>

<body>

    <h1>Add School</h1>

    <p>
        <a href="/dashboard/schools/">← Back to Schools</a>
    </p>

    <form method="POST" id="schoolForm" novalidate>

        {% csrf_token %}

        <p>
            <label>School Name</label><br>
            <input
                type="text"
                name="name"
                placeholder="Enter School Name"
                novalidate >
        </p>

        <p>
            <label>Principal Name</label><br>
            <input
                type="text"
                name="principal"
                placeholder="Enter Principal Name"
                novalidate >
        </p>

        <p>
            <label>Address</label><br>
            <textarea
                name="address"
                rows="4"
                cols="40"
                placeholder="Enter School Address"
                novalidate
            ></textarea>
        </p>

        <p>
    <label>Established Year</label><br>
    <input
        type="number"
        name="established_year"
        placeholder="Enter Established Year"
        novalidate
    >
</p>

        <button type="submit">
            Save School
        </button>

    </form>

</body>

</html>
