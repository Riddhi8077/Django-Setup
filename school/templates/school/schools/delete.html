<!DOCTYPE html>
<html>

<head>
    <title>Delete School</title>
</head>

<body>

<h2>Delete School</h2>

<p>
    Are you sure you want to delete
    <strong>{{ school.name }}</strong>?
</p>

<form method="POST" id="schoolForm" novalidate>

    {% csrf_token %}

    <button type="submit">
        Yes, Delete
    </button>

</form>

<br>

<a href="/dashboard/schools/">Cancel</a>

</body>

</html>
