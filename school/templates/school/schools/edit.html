<!DOCTYPE html>
<html>

<head>
    <title>Edit School</title>
</head>

<body>

<h1>Edit School</h1>

<p>
    <a href="/dashboard/schools/">← Back</a>
</p>

<form method="POST" id="schoolForm" novalidate>

    {% csrf_token %}

    <p>
        <label>School Name</label><br>
        <input
            type="text"
            name="name"
            value="{{ school.name }}"
            novalidate
        >
    </p>

    <p>
        <label>Principal</label><br>
        <input
            type="text"
            name="principal"
            value="{{ school.principal }}"
            novalidate
        >
    </p>

    <p>
        <label>Address</label><br>
        <textarea
            name="address"
            rows="4"
            cols="40"
            novalidate
        >{{ school.address }}</textarea>
    </p>

    <p>
        <label>Established Year</label><br>
        <input
            type="number"
            name="established_year"
            value="{{ school.established_year }}"
            novalidate
        >
    </p>

    <button type="submit">
        Update School
    </button>

</form>

</body>
</html>
