<!DOCTYPE html>
<html>

<head>
    <title>Schools</title>
</head>

<body>

<h1>Schools</h1>

<p>
    <a href="/dashboard/">Dashboard</a> |
    <a href="{% url 'school_add' %}">Add School</a>
</p>

<table border="1" cellpadding="10">

    <tr>
        <th>ID</th>
        <th>School Name</th>
        <th>Principal</th>
        <th>Address</th>
        <th>Actions</th>
    </tr>

    {% for school in schools %}

    <tr>

        <td>{{ school.id }}</td>

        <td>{{ school.name }}</td>

        <td>{{ school.principal }}</td>

        <td>{{ school.address }}</td>

        <td>

            <a href="/dashboard/schools/edit/{{ school.id }}/">Edit</a>

            |

            <a href="/dashboard/schools/delete/{{ school.id }}/">Delete</a>

        </td>

    </tr>

    {% empty %}

    <tr>

        <td colspan="5">

            No schools found.

        </td>

    </tr>

    {% endfor %}

</table>

</body>

</html>
