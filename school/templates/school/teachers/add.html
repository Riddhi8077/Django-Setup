<!DOCTYPE html>
<html>

<head>

    <title>Add Teacher</title>

    <style>

        .error{
            color:red;
            font-size:14px;
            display:block;
            margin-top:5px;
        }

        .error-input{
            border:2px solid red;
        }

        .error{
            color:red;
            font-size:14px;
            margin-top:5px;
        }

    </style>

</head>

<body>

<h1>Add Teacher</h1>

<p>
    <a href="/dashboard/teachers/">← Back</a>
</p>

<form method="POST" id="teacherForm" novalidate>

    {% csrf_token %}

    <p>

        <label>Classroom</label><br>

        <select id="classroom" name="classroom">

            <option value="">Select Classroom</option>

            {% for classroom in classrooms %}

            <option
                value="{{ classroom.id }}"
                {% if old.classroom == classroom.id|stringformat:"s" %}selected{% endif %}
            >
                {{ classroom.class_name }}
            </option>

            {% endfor %}

        </select>

        <span class="error" id="classroomError">
            {{ errors.classroom }}
        </span>

    </p>

    <p>

        <label>First Name</label><br>

        <input
            type="text"
            id="first_name"
            name="first_name"
            value="{{ old.first_name }}"
        >

        <span class="error" id="firstNameError">
            {{ errors.first_name }}
        </span>

    </p>

    <p>

        <label>Last Name</label><br>

        <input
            type="text"
            id="last_name"
            name="last_name"
            value="{{ old.last_name }}"
        >

        <span class="error" id="lastNameError">
            {{ errors.last_name }}
        </span>

    </p>

    <p>

        <label>Subject</label><br>

        <input
            type="text"
            id="subject"
            name="subject"
            value="{{ old.subject }}"
        >

        <span class="error" id="subjectError">
            {{ errors.subject }}
        </span>

    </p>

    <p>

        <label>Email</label><br>

        <input
            type="email"
            id="email"
            name="email"
            value="{{ old.email }}"
        >

        {% if errors.email %}
        <span class="error" id="emailError">
            {{ errors.email }}
        </span>
        {% else %}
        <span class="error" id="emailError"></span>
        {% endif %}

    </p>

    <button type="submit">

        Save Teacher

    </button>

</form>

<script>

const form = document.getElementById("teacherForm");

form.addEventListener("submit", function(e){

    let valid = true;

    document.querySelectorAll(".error").forEach(function(error){
        error.innerHTML = "";
    });

    document.querySelectorAll("input,select").forEach(function(field){
        field.classList.remove("error-input");
    });

    const classroom = document.getElementById("classroom");

    if(classroom.value === ""){

        document.getElementById("classroomError").innerHTML =
        "Please select a classroom.";

        classroom.classList.add("error-input");

        valid = false;

    }

    const firstName = document.getElementById("first_name");

    if(firstName.value.trim() === ""){

        document.getElementById("firstNameError").innerHTML =
        "First name is required.";

        firstName.classList.add("error-input");

        valid = false;

    }

    const lastName = document.getElementById("last_name");

    if(lastName.value.trim() === ""){

        document.getElementById("lastNameError").innerHTML =
        "Last name is required.";

        lastName.classList.add("error-input");

        valid = false;

    }

    const subject = document.getElementById("subject");

    if(subject.value.trim() === ""){

        document.getElementById("subjectError").innerHTML =
        "Subject is required.";

        subject.classList.add("error-input");

        valid = false;

    }

    const email = document.getElementById("email");

    if(email.value.trim() === ""){

        document.getElementById("emailError").innerHTML =
        "Email is required.";

        email.classList.add("error-input");

        valid = false;

    }
    else{

        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if(!emailPattern.test(email.value.trim())){

            document.getElementById("emailError").innerHTML =
            "Please enter a valid email address.";

            email.classList.add("error-input");

            valid = false;

        }

    }

    if(!valid){

        e.preventDefault();

    }

});

</script>

</body>

</html>
