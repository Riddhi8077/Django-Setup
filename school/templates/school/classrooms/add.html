<!DOCTYPE html>
<html>
<head>
    <title>Add Classroom</title>
</head>
<body>

<h1>Add Classroom</h1>

<p>
    <a href="/dashboard/classrooms/">← Back</a>
</p>

<form method="POST" id="schoolForm" novalidate>
    {% csrf_token %}

    <p>
        <label>School</label><br>
        <select name="school" novalidate>
            {% for school in schools %}
                <option value="{{ school.id }}">{{ school.name }}</option>
            {% endfor %}
        </select>
    </p>

    <p>
        <label>Class Name</label><br>
        <input type="text" name="class_name" novalidate>
    </p>

    <p>
        <label>Room Number</label><br>
        <input type="number" name="room_number" novalidate>
    </p>

    <p>
        <label>Capacity</label><br>
        <input type="number" name="capacity" novalidate>
    </p>

    <button type="submit">Save Classroom</button>
</form>

</body>
</html>
