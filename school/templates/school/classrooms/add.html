<!DOCTYPE html>
<html>

<head>

    <title>Add Classroom</title>

    <style>

        .error{
            color:red;
            font-size:14px;
            display:block;
            margin-top:5px;
        }

        .error-input{
            border:2px solid red;
        }

    </style>

</head>

<body>

<h1>Add Classroom</h1>

<p>
    <a href="/dashboard/classrooms/">← Back</a>
</p>

<form method="POST" id="classroomForm" novalidate>

    {% csrf_token %}

    <p>

        <label>School</label><br>

        <select id="school" name="school">

            <option value="">Select School</option>

            {% for school in schools %}

                <option
                    value="{{ school.id }}"
                    {% if old.school == school.id|stringformat:"s" %}selected{% endif %}
                >
                    {{ school.name }}
                </option>

            {% endfor %}

        </select>

        <span class="error" id="schoolError">
            {{ errors.school }}
        </span>

    </p>

    <p>

        <label>Class Name</label><br>

        <input
            type="text"
            id="class_name"
            name="class_name"
            value="{{ old.class_name }}"
        >

        <span class="error" id="classNameError">
            {{ errors.class_name }}
        </span>

    </p>

    <p>

        <label>Room Number</label><br>

        <input
            type="number"
            id="room_number"
            name="room_number"
            value="{{ old.room_number }}"
        >

        <span class="error" id="roomNumberError">
            {{ errors.room_number }}
        </span>

    </p>

    <p>

        <label>Capacity</label><br>

        <input
            type="number"
            id="capacity"
            name="capacity"
            value="{{ old.capacity }}"
        >

        <span class="error" id="capacityError">
            {{ errors.capacity }}
        </span>

    </p>

    <button type="submit">

        Save Classroom

    </button>

</form>

<script>

const form = document.getElementById("classroomForm");

form.addEventListener("submit", function(e){

    let valid = true;

    document.querySelectorAll(".error").forEach(function(error){

        error.innerHTML = "";

    });

    document.querySelectorAll("input,select").forEach(function(field){

        field.classList.remove("error-input");

    });


    const school = document.getElementById("school");

    if(school.value === ""){

        document.getElementById("schoolError").innerHTML =
        "Please select a school.";

        school.classList.add("error-input");

        valid = false;

    }


    const className = document.getElementById("class_name");

    if(className.value.trim() === ""){

        document.getElementById("classNameError").innerHTML =
        "Class name is required.";

        className.classList.add("error-input");

        valid = false;

    }


    const room = document.getElementById("room_number");

    if(room.value.trim() === ""){

        document.getElementById("roomNumberError").innerHTML =
        "Room number is required.";

        room.classList.add("error-input");

        valid = false;

    }
    else if(Number(room.value) <= 0){

        document.getElementById("roomNumberError").innerHTML =
        "Room number must be greater than 0.";

        room.classList.add("error-input");

        valid = false;

    }


    const capacity = document.getElementById("capacity");

    if(capacity.value.trim() === ""){

        document.getElementById("capacityError").innerHTML =
        "Capacity is required.";

        capacity.classList.add("error-input");

        valid = false;

    }
    else if(Number(capacity.value) <= 0){

        document.getElementById("capacityError").innerHTML =
        "Capacity must be greater than 0.";

        capacity.classList.add("error-input");

        valid = false;

    }

    if(!valid){

        e.preventDefault();

    }

});

document.querySelectorAll("input,select").forEach(function(field){

    field.addEventListener("input", function(){

        field.classList.remove("error-input");

    });

});

</script>

</body>

</html>
